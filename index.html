<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的世界1.21.11Java资源下载</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>文件下载</h1>

        <ul class="file-list" id="fileList"></ul>

    </div>

    <script>
        const files = [
            { name: 'JiYuTrainer.exe', icon: '🎮', ext: '极域管理程序' , isExternal: true, url: 'https://pan.huang1111.cn/s/we9GxfK' },
            { name: 'idman642build63.exe', icon: '📥', ext: 'IDM多线程下载器' , isExternal: true, url: 'https://pan.huang1111.cn/s/QzQgbcm' },
            { name: 'Survival_MC1.21.11压缩包', icon: '📦', ext: 'HMCL启动器包', isExternal: true, url: 'https://pan.huang1111.cn/s/A6aeMTB' },
        ];

        const fileListEl = document.getElementById('fileList');

        files.forEach(file => {
            const li = document.createElement('li');
            li.className = 'file-item';
            if (file.isExternal) {
                li.innerHTML = `
                    <div class="file-info">
                        <div class="file-icon">${file.icon}</div>
                        <div>
                            <div class="file-name">${file.name}</div>
                            <div class="file-ext">${file.ext}</div>
                        </div>
                    </div>
                    <a class="download-btn" href="${file.url}" target="_blank">前往下载</a>
                `;
            } else {
                li.innerHTML = `
                    <div class="file-info">
                        <div class="file-icon">${file.icon}</div>
                        <div>
                            <div class="file-name">${file.name}</div>
                            <div class="file-ext">${file.ext}</div>
                        </div>
                    </div>
                    <a class="download-btn" href="${rawBase + encodeURIComponent(file.name)}" download="${file.name}">下载</a>
                `;
            }
            fileListEl.appendChild(li);
        });
    </script>
</body>
</html>
